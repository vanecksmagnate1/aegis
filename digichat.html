  /* ---------- Banners: carrusel en el header del chat ---------- */
  function renderActiveBanner(){
    const el = document.getElementById('dc-banner');
    if (!el) return;
    if (!BANNERS.length) {
      el.style.backgroundImage = `url('${THEME_ICONS.banner}')`;
      el.classList.remove('dc-banner-clickable');
      el.onclick = null;
      return;
    }
    const current = BANNERS[bannerRotationIndex % BANNERS.length];
    el.style.backgroundImage = `url('${current.imageData}')`;
    if (current.linkUrl) {
      el.classList.add('dc-banner-clickable');
      el.onclick = () => window.open(current.linkUrl, '_blank', 'noopener,noreferrer');
    } else {
      el.classList.remove('dc-banner-clickable');
      el.onclick = null;
    }
  }

  function setupBannerRotationTimer(){
    if (bannerRotationTimer) clearInterval(bannerRotationTimer);
    if (BANNERS.length < 2) return;
    bannerRotationTimer = setInterval(() => {
      bannerRotationIndex = (bannerRotationIndex + 1) % BANNERS.length;
      renderActiveBanner();
    }, Math.max(1, BANNER_ROTATION_MINUTES) * 60000);
  }

  /* ---------- ChatHelper: cualquier cliente conectado puede disparar el
     próximo mensaje (chat_helper_try_claim es atómica del lado del server,
     así que aunque haya muchos clientes chequeando a la vez, solo uno
     "gana" y lo postea de verdad — ver la función en el SQL). No requiere
     que el admin esté conectado. ---------- */
  async function checkChatHelperDue(){
    if (!HELPER_MESSAGES.length) return;
    try {
      const { data, error } = await sb.rpc('chat_helper_try_claim');
      if (error) return;
      const result = Array.isArray(data) ? data[0] : data;
      if (!result || !result.claimed) return;
      const msg = HELPER_MESSAGES[Math.floor(Math.random() * HELPER_MESSAGES.length)];
      await sb.from('chat_messages').insert({
        room: LOCKED_ROOM,
        nick: result.nick || 'Ayudante',
        color: HELPER_NICK_COLOR,
        text_color: result.text_color || null,
        avatar: result.icon || 'default',
        role: 'general',
        kind: 'chat',
        body: msg.body,
      });
    } catch (e) { /* noop: no pasa nada si un chequeo falla, se reintenta en el próximo */ }
  }

  function setupHelperCheckTimer(){
    if (helperCheckTimer) clearInterval(helperCheckTimer);
    helperCheckTimer = setInterval(checkChatHelperDue, 60000);
    checkChatHelperDue();
  }

  async function loadInitialData(){
    let roomsQuery = sb.from('chat_rooms').select(ROOM_SELECT_COLS);
    ROOM_ORDER.forEach(o => { roomsQuery = roomsQuery.order(o.column, { ascending: o.ascending }); });
    const [
      { data: rooms }, { data: bans }, { data: mutes }, { data: mods }, { data: adminProfileRows },
      { data: banners }, { data: bannerSettingsRows }, { data: emoticons }, { data: helperMessages },
      { data: wordFilters }, { data: emoticonSettingsRows }, { data: themeSettingsRows },
    ] = await Promise.all([
      roomsQuery,
      sb.from('chat_bans').select('nick_lower'),
      sb.from('chat_mutes').select('nick_lower'),
      sb.from('chat_moderators').select('nick_lower'),
      sb.from('chat_admin_profile').select('*').eq('nick_lower', ADMIN_NICK.toLowerCase()),
      sb.from('chat_banners').select('id,image_data,link_url,sort_order').order('sort_order', { ascending: true }),
      sb.from('chat_banner_settings').select('rotation_minutes').eq('id', true),
      sb.from('chat_custom_emoticons').select('id,shortcode,image_data').order('id', { ascending: true }),
      sb.from('chat_helper_messages').select('id,body,sort_order').order('sort_order', { ascending: true }),
      sb.from('chat_word_filters').select('id,word,replacement').order('id', { ascending: true }),
      sb.from('chat_emoticon_settings').select('hidden_defaults').eq('id', true),
      sb.from('chat_theme_settings').select('active_theme').eq('id', true),
    ]);
    applyRoomRows(rooms);
    bannedNicks = new Set((bans||[]).map(b=>b.nick_lower));
    mutedNicks = new Set((mutes||[]).map(m=>m.nick_lower));
    moderatorNicks = new Set((mods||[]).map(m=>m.nick_lower));
    savedAdminProfile = (adminProfileRows && adminProfileRows[0]) || null;
    applyBannerRows(banners);
    applyBannerSettings(bannerSettingsRows && bannerSettingsRows[0]);
    applyEmoticonRows(emoticons);
    applyHelperMessageRows(helperMessages);
    applyFilterRows(wordFilters);
    applyEmoticonSettingsRow(emoticonSettingsRows && emoticonSettingsRows[0]);
    applyThemeSettingsRow(themeSettingsRows && themeSettingsRows[0]);
    renderRoomsPanel();
    renderUsers();
    setupHelperCheckTimer();
  }

  // Si cierran la pestaña/navegador sin darle a Logout, avisamos de todas
  // formas que nos desconectamos para que no quede un usuario fantasma en
  // la lista (Supabase igual lo detecta solo tras un rato sin respuesta,
  // pero esto lo hace prácticamente inmediato en un cierre normal).
  window.addEventListener('pagehide', () => {
    if (presenceChannel && me.nick) {
      try { presenceChannel.untrack(); } catch (e) { /* noop */ }
    }
  });

  render();
  rescaleDigichat();
  wireMsgCenter();
  setupGlobalSubscriptions();
  setupPresence();
  loadInitialData();
})();
</script>
</body>
</html>
