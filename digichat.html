  /* ---------- REALTIME GLOBAL: presencia, bans, mutes, mods, salas, broadcasts ---------- */
  function rebuildPresenceList(){
    if (!presenceChannel) { presenceList = []; return; }
    const state = presenceChannel.presenceState();
    const raw = [];
    Object.values(state).forEach(arr => arr.forEach(p => raw.push(p)));
    // 1) Colapsa por clientId: al re-trackear (p.ej. al cambiar de nick, color o
    // avatar) Supabase puede dejar momentáneamente (o si los cambios son muy
    // rápidos, hasta un buen rato) varias metas bajo la misma sesión. Nos
    // quedamos con la de mayor updatedAt, no con "la última del array": el
    // orden que devuelve Supabase no siempre refleja cuál se trackeó al final.
    const byClient = new Map();
    raw.forEach(p => {
      const existing = byClient.get(p.clientId);
      if (!existing || (p.updatedAt||0) >= (existing.updatedAt||0)) byClient.set(p.clientId, p);
    });
    // 2) Dedupe by nickname (case-insensitive): la lista visible nunca debe mostrar
    // el mismo nombre dos veces entre personas distintas. Igual que arriba, gana
    // la de mayor updatedAt; la excepción es que mi propia entrada nunca debe ser
    // reemplazada por un fantasma ajeno.
    const byNick = new Map();
    [...byClient.values()].forEach(p => {
      const key = p.nick.toLowerCase();
      const existing = byNick.get(key);
      if (existing && existing.clientId === CLIENT_ID && p.clientId !== CLIENT_ID) return;
      if (existing && existing.clientId !== CLIENT_ID && p.clientId !== CLIENT_ID && (existing.updatedAt||0) > (p.updatedAt||0)) return;
      byNick.set(key, p);
    });
    presenceList = [...byNick.values()];
  }

  // Cada track() (incluso re-trackear la MISMA sesion, p.ej. al cambiar un
  // color) puede generar un 'leave' + 'join' de corta duracion para esa
  // sesion en vez de una actualizacion "en el lugar" - es un comportamiento
  // conocido de Phoenix/Supabase Presence. Sin este debounce, cualquier
  // cosa que re-trackee seguido (el heartbeat, cambios de perfil) se ve
  // como si ese usuario "entrara y saliera" todo el tiempo. Esperamos un
  // instante antes de dar una salida por real; si en ese lapso llega el
  // 'join' de la misma sesion, se cancela y no se muestra ningun aviso.
  const pendingLeaveTimers = new Map();

  function setupPresence(){
    presenceChannel = sb.channel('chat-aegis-presence', { config: { presence: { key: CLIENT_ID } } });
    presenceChannel.on('presence', { event:'sync' }, () => {
      rebuildPresenceList();
      renderUsers();
      renderRoomsPanel();
      refreshAdminPanelIfOpen();
    });
    presenceChannel.on('presence', { event:'join' }, ({ newPresences }) => {
      newPresences.forEach(p => {
        if (pendingLeaveTimers.has(p.clientId)) {
          // Era solo un re-track (leave+join casi simultaneo de la misma
          // sesion): cancelamos el aviso de salida pendiente, no es una
          // entrada nueva real.
          clearTimeout(pendingLeaveTimers.get(p.clientId));
          pendingLeaveTimers.delete(p.clientId);
          return;
        }
        // el admin nunca deja rastro de entrada/salida por presencia (ni
        // siquiera al activar/desactivar modo invisible): el aviso normal
        // ya lo maneja announceAdmin, y en modo invisible no debe haber
        // ningun aviso, ni siquiera este efimero.
        if (p.clientId !== CLIENT_ID && p.room === me.room && me.nick && p.role !== 'admin') {
          addLogEntry(p.room, { sys:true, nick:p.nick, avatar:p.avatar, text:`ha entrado a ${p.room}.`, joinleave:true });
          renderLog();
        }
      });
    });
    presenceChannel.on('presence', { event:'leave' }, ({ leftPresences }) => {
      leftPresences.forEach(p => {
        const timer = setTimeout(() => {
          pendingLeaveTimers.delete(p.clientId);
          if (p.clientId !== CLIENT_ID && p.room === me.room && me.nick && p.role !== 'admin') {
            addLogEntry(p.room, { sys:true, nick:p.nick, avatar:p.avatar, text:`ha salido de ${p.room}.`, joinleave:true });
            renderLog();
          }
        }, 2000);
        pendingLeaveTimers.set(p.clientId, timer);
      });
    });
    presenceChannel.subscribe((status) => {
      if (status === 'SUBSCRIBED' && me.nick) {
        presenceChannel.track(presencePayload());
      }
    });
    // Heartbeat "seguro": SOLO reconstruye y re-renderiza con lo que el
    // cliente ya tiene en local (presenceState()), sin volver a trackear.
    // No genera trafico ni el efecto secundario de leave/join en otros -
    // sirve para el caso en que el render se salteo pero el estado local
    // ya estaba bien. Puede correr seguido sin costo.
    if (presenceHeartbeat) clearInterval(presenceHeartbeat);
    presenceHeartbeat = setInterval(refreshLocalPresenceView, 5000);
  }

  function refreshLocalPresenceView(){
    if (!presenceChannel) return;
    rebuildPresenceList();
    renderUsers();
    renderRoomsPanel();
  }

  // Re-trackea la propia presencia (dispara un 'sync' fresco para todos,
  // con riesgo minimo del leave/join corto que mitiga el debounce de
  // arriba) ademas de refrescar la vista local. Se usa solo en momentos
  // puntuales donde de verdad puede haber pasado algo mientras no
  // mirabamos: cuando la pestaña vuelve a primer plano, porque los
  // navegadores frenan los websockets/timers de pestañas en segundo plano.
  function forcePresenceResync(){
    if (!presenceChannel || !me.nick) return;
    presenceChannel.track(presencePayload());
    refreshLocalPresenceView();
    refreshAdminPanelIfOpen();
  }
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) forcePresenceResync();
  });
  window.addEventListener('focus', forcePresenceResync);

  function handleBansChange(payload){
    if (payload.eventType === 'INSERT') {
      bannedNicks.add(payload.new.nick_lower);
      if (me.nick && payload.new.nick_lower === me.nick.toLowerCase()) { forceLogout('Fuiste baneado.'); return; }
    } else if (payload.eventType === 'DELETE') {
      bannedNicks.delete(payload.old.nick_lower);
    }
    renderUsers();
    refreshAdminPanelIfOpen();
  }

  function handleMutesChange(payload){
    if (payload.eventType === 'INSERT') {
      mutedNicks.add(payload.new.nick_lower);
      if (me.nick && payload.new.nick_lower === me.nick.toLowerCase()) localSystem('Has sido muteado por un administrador.');
    } else if (payload.eventType === 'DELETE') {
      mutedNicks.delete(payload.old.nick_lower);
      if (me.nick && payload.old.nick_lower === me.nick.toLowerCase()) localSystem('Ya puedes volver a escribir.');
    }
    renderUsers();
    refreshAdminPanelIfOpen();
  }

  function handleModsChange(payload){
    if (payload.eventType === 'INSERT') moderatorNicks.add(payload.new.nick_lower);
    else if (payload.eventType === 'DELETE') moderatorNicks.delete(payload.old.nick_lower);
    if (me.nick && me.role !== 'admin') {
      const shouldBeMod = moderatorNicks.has(me.nick.toLowerCase());
      const newRole = shouldBeMod ? 'moderator' : 'general';
      if (newRole !== me.role) {
        me.role = newRole;
        me.color = newRole === 'moderator' ? MOD_COLOR : GENERAL_COLOR;
        retrackPresence();
        localSystem(newRole === 'moderator' ? 'Has sido ascendido a moderador.' : 'Ya no eres moderador.');
      }
    }
    renderUsers();
    refreshAdminPanelIfOpen();
  }

  const ROOM_SELECT_COLS = 'name,is_private,created_by,expires_at';
  const ROOM_ORDER = [{ column: 'is_private', ascending: true }, { column: 'sort_order', ascending: true }];

  // Puebla ROOMS (array de strings, como siempre) y ROOM_META (candado/
  // dueño/vencimiento) a partir de las mismas filas de chat_rooms.
  function applyRoomRows(rows){
    ROOMS = (rows||[]).map(r=>r.name);
    if (!ROOMS.length) ROOMS = [LOCKED_ROOM];
    ROOM_META = {};
    (rows||[]).forEach(r => {
      ROOM_META[r.name] = { isPrivate: !!r.is_private, createdBy: r.created_by || null, expiresAt: r.expires_at || null };
    });
  }

  async function refreshRooms(){
    let q = sb.from('chat_rooms').select(ROOM_SELECT_COLS);
    ROOM_ORDER.forEach(o => { q = q.order(o.column, { ascending: o.ascending }); });
    const { data } = await q;
    applyRoomRows(data);
    if (me.nick && !ROOMS.includes(me.room)) await switchRoom(LOCKED_ROOM);
    renderRoomsPanel();
    refreshAdminPanelIfOpen();
  }

  function setupGlobalSubscriptions(){
    globalsChannel = sb.channel('chat-aegis-globals')
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_bans' }, handleBansChange)
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_mutes' }, handleMutesChange)
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_moderators' }, handleModsChange)
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_rooms' }, () => refreshRooms())
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'chat_broadcasts' }, (payload) => showBroadcast(payload.new.body))
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_banners' }, () => refreshBanners())
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_banner_settings' }, () => refreshBannerSettings())
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_custom_emoticons' }, () => refreshEmoticons())
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_helper_messages' }, () => refreshHelperMessages())
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_word_filters' }, () => refreshWordFilters())
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_emoticon_settings' }, () => refreshEmoticonSettings())
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_theme_settings' }, () => refreshThemeSettings())
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_frame_settings' }, () => refreshFrameSettings())
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_avatar_settings' }, () => refreshAvatarSettings())
      .subscribe();
  }

  async function refreshWordFilters(){
    const { data } = await sb.from('chat_word_filters').select('id,word,replacement').order('id', { ascending: true });
    applyFilterRows(data);
  }

  async function refreshEmoticonSettings(){
    const { data } = await sb.from('chat_emoticon_settings').select('hidden_defaults').eq('id', true);
    applyEmoticonSettingsRow(data && data[0]);
  }

  async function refreshBanners(){
    const { data } = await sb.from('chat_banners').select('id,image_data,link_url,sort_order').order('sort_order', { ascending: true });
    applyBannerRows(data);
  }
  async function refreshBannerSettings(){
    const { data } = await sb.from('chat_banner_settings').select('rotation_minutes').eq('id', true);
    applyBannerSettings(data && data[0]);
  }
  async function refreshEmoticons(){
    const { data } = await sb.from('chat_custom_emoticons').select('id,shortcode,image_data').order('id', { ascending: true });
    applyEmoticonRows(data);
  }
  async function refreshHelperMessages(){
    const { data } = await sb.from('chat_helper_messages').select('id,body,sort_order').order('sort_order', { ascending: true });
    applyHelperMessageRows(data);
  }

  function applyBannerRows(rows){
    BANNERS = (rows||[]).map(r => ({ id: r.id, imageData: r.image_data, linkUrl: r.link_url, sortOrder: r.sort_order }));
    if (bannerRotationIndex >= BANNERS.length) bannerRotationIndex = 0;
    renderActiveBanner();
    setupBannerRotationTimer();
    refreshAdminPanelIfOpen();
  }

  function applyBannerSettings(row){
    BANNER_ROTATION_MINUTES = (row && row.rotation_minutes) || 5;
    setupBannerRotationTimer();
    refreshAdminPanelIfOpen();
  }

  // Aplica la piel visual al documento entero (html[data-theme=...]), para
  // que tambien alcance al overlay de broadcast global que vive fuera de
  // #dc-root. "default" no pone atributo: es el look de siempre, intacto.
  function applyThemeToDom(theme){
    if (theme && theme !== 'default') document.documentElement.setAttribute('data-theme', theme);
    else document.documentElement.removeAttribute('data-theme');
  }
  function applyThemeSettingsRow(row){
    const theme = (row && row.active_theme) || 'default';
    ACTIVE_THEME = AVAILABLE_THEMES.some(t => t.id === theme) ? theme : 'default';
    THEME_FORCED_AT_MS = (row && row.forced_at) ? new Date(row.forced_at).getTime() : 0;
    applyThemeToDom(effectiveTheme());
    refreshAdminPanelIfOpen();
    if (document.getElementById('dc-settings-overlay')?.classList.contains('active') && settingsTab === 'themes') renderSettingsBody();
  }
  async function refreshThemeSettings(){
    const { data } = await sb.from('chat_theme_settings').select('active_theme, forced_at').eq('id', true);
    applyThemeSettingsRow(data && data[0]);
  }

  function applyEmoticonRows(rows){
    CUSTOM_EMOTICONS = (rows||[]).map(r => ({ id: r.id, shortcode: r.shortcode, imageData: r.image_data }));
    CUSTOM_EMOTICON_MAP = new Map(CUSTOM_EMOTICONS.map(e => [e.shortcode, e.imageData]));
    CUSTOM_EMOTICON_RE = CUSTOM_EMOTICONS.length
      ? new RegExp(CUSTOM_EMOTICONS.map(e => e.shortcode.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|'), 'g')
      : null;
    wireEmoticonPickers();
    refreshAdminPanelIfOpen();
  }

  function applyHelperMessageRows(rows){
    HELPER_MESSAGES = (rows||[]).map(r => ({ id: r.id, body: r.body, sortOrder: r.sort_order }));
    refreshAdminPanelIfOpen();
  }

  function applyFilterRows(rows){
    FILTER_WORDS = (rows||[]).map(r => ({ id: r.id, word: r.word, replacement: r.replacement }));
    FILTER_WORD_MAP = new Map(FILTER_WORDS.map(f => [f.word.toLowerCase(), f.replacement]));
    FILTER_WORD_RE = FILTER_WORDS.length
      ? new RegExp(`(?<![\\p{L}\\p{N}_])(${FILTER_WORDS.map(f => f.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|')})(?![\\p{L}\\p{N}_])`, 'giu')
      : null;
    renderLog();
    refreshAdminPanelIfOpen();
  }

  function applyEmoticonSettingsRow(row){
    HIDDEN_DEFAULT_EMOTICONS = new Set(Array.isArray(row?.hidden_defaults) ? row.hidden_defaults : []);
    wireEmoticonPickers();
    refreshAdminPanelIfOpen();
  }

  async function refreshAvatarSettings(){
    const { data } = await sb.from('chat_avatar_settings').select('hidden_defaults').eq('id', true);
    applyAvatarSettingsRow(data && data[0]);
  }

  function applyAvatarSettingsRow(row){
    HIDDEN_CINEMA_AVATARS = new Set(Array.isArray(row?.hidden_defaults) ? row.hidden_defaults : []);
    if (document.getElementById('dc-settings-overlay')?.classList.contains('active') && settingsTab === 'profile') renderSettingsBody();
    refreshAdminPanelIfOpen();
  }

  async function refreshFrameSettings(){
    const { data } = await sb.from('chat_frame_settings').select('enabled_defaults').eq('id', true);
    applyFrameSettingsRow(data && data[0]);
  }

  function applyFrameSettingsRow(row){
    ENABLED_FRAMES = new Set(Array.isArray(row?.enabled_defaults) ? row.enabled_defaults : ['laton']);
    if (document.getElementById('dc-settings-overlay')?.classList.contains('active') && settingsTab === 'profile') renderSettingsBody();
    refreshAdminPanelIfOpen();
  }

  /* ---------- Banners: carrusel en el header del chat ---------- */
  function renderActiveBanner(){
    const el = document.getElementById('dc-banner');
    if (!el) return;
    if (!BANNERS.length) {
      el.style.backgroundImage = `url('${THEME_ICONS.banner}')`;
      el.classList.remove('dc-banner-clickable');
      el.onclick = null;
      return;
    }
    const current = BANNERS[bannerRotationIndex % BANNERS.length];
    el.style.backgroundImage = `url('${current.imageData}')`;
    if (current.linkUrl) {
      el.classList.add('dc-banner-clickable');
      el.onclick = () => window.open(current.linkUrl, '_blank', 'noopener,noreferrer');
    } else {
      el.classList.remove('dc-banner-clickable');
      el.onclick = null;
    }
  }

  function setupBannerRotationTimer(){
    if (bannerRotationTimer) clearInterval(bannerRotationTimer);
    if (BANNERS.length < 2) return;
    bannerRotationTimer = setInterval(() => {
      bannerRotationIndex = (bannerRotationIndex + 1) % BANNERS.length;
      renderActiveBanner();
    }, Math.max(1, BANNER_ROTATION_MINUTES) * 60000);
  }

  /* ---------- ChatHelper: cualquier cliente conectado puede disparar el
     próximo mensaje (chat_helper_try_claim es atómica del lado del server,
     así que aunque haya muchos clientes chequeando a la vez, solo uno
     "gana" y lo postea de verdad — ver la función en el SQL). No requiere
     que el admin esté conectado. ---------- */
  async function checkChatHelperDue(){
    if (!HELPER_MESSAGES.length) return;
    try {
      const { data, error } = await sb.rpc('chat_helper_try_claim');
      if (error) return;
      const result = Array.isArray(data) ? data[0] : data;
      if (!result || !result.claimed) return;
      const msg = HELPER_MESSAGES[Math.floor(Math.random() * HELPER_MESSAGES.length)];
      await sb.from('chat_messages').insert({
        room: LOCKED_ROOM,
        nick: result.nick || 'Ayudante',
        color: HELPER_NICK_COLOR,
        text_color: result.text_color || null,
        avatar: result.icon || 'default',
        role: 'general',
        kind: 'chat',
        body: msg.body,
      });
    } catch (e) { /* noop: no pasa nada si un chequeo falla, se reintenta en el próximo */ }
  }

  function setupHelperCheckTimer(){
    if (helperCheckTimer) clearInterval(helperCheckTimer);
    helperCheckTimer = setInterval(checkChatHelperDue, 60000);
    checkChatHelperDue();
  }

  async function loadInitialData(){
    let roomsQuery = sb.from('chat_rooms').select(ROOM_SELECT_COLS);
    ROOM_ORDER.forEach(o => { roomsQuery = roomsQuery.order(o.column, { ascending: o.ascending }); });
    const [
      { data: rooms }, { data: bans }, { data: mutes }, { data: mods }, { data: adminProfileRows },
      { data: banners }, { data: bannerSettingsRows }, { data: emoticons }, { data: helperMessages },
      { data: wordFilters }, { data: emoticonSettingsRows }, { data: themeSettingsRows }, { data: frameSettingsRows },
      { data: avatarSettingsRows },
    ] = await Promise.all([
      roomsQuery,
      sb.from('chat_bans').select('nick_lower'),
      sb.from('chat_mutes').select('nick_lower'),
      sb.from('chat_moderators').select('nick_lower'),
      sb.from('chat_admin_profile').select('*').eq('nick_lower', ADMIN_NICK.toLowerCase()),
      sb.from('chat_banners').select('id,image_data,link_url,sort_order').order('sort_order', { ascending: true }),
      sb.from('chat_banner_settings').select('rotation_minutes').eq('id', true),
      sb.from('chat_custom_emoticons').select('id,shortcode,image_data').order('id', { ascending: true }),
      sb.from('chat_helper_messages').select('id,body,sort_order').order('sort_order', { ascending: true }),
      sb.from('chat_word_filters').select('id,word,replacement').order('id', { ascending: true }),
      sb.from('chat_emoticon_settings').select('hidden_defaults').eq('id', true),
      sb.from('chat_theme_settings').select('active_theme, forced_at').eq('id', true),
      sb.from('chat_frame_settings').select('enabled_defaults').eq('id', true),
      sb.from('chat_avatar_settings').select('hidden_defaults').eq('id', true),
    ]);
    applyRoomRows(rooms);
    bannedNicks = new Set((bans||[]).map(b=>b.nick_lower));
    mutedNicks = new Set((mutes||[]).map(m=>m.nick_lower));
    moderatorNicks = new Set((mods||[]).map(m=>m.nick_lower));
    savedAdminProfile = (adminProfileRows && adminProfileRows[0]) || null;
    applyBannerRows(banners);
    applyBannerSettings(bannerSettingsRows && bannerSettingsRows[0]);
    applyEmoticonRows(emoticons);
    applyHelperMessageRows(helperMessages);
    applyFilterRows(wordFilters);
    applyEmoticonSettingsRow(emoticonSettingsRows && emoticonSettingsRows[0]);
    applyThemeSettingsRow(themeSettingsRows && themeSettingsRows[0]);
    applyFrameSettingsRow(frameSettingsRows && frameSettingsRows[0]);
    applyAvatarSettingsRow(avatarSettingsRows && avatarSettingsRows[0]);
    renderRoomsPanel();
    renderUsers();
    setupHelperCheckTimer();
  }

  // Si cierran la pestaña/navegador sin darle a Logout, avisamos de todas
  // formas que nos desconectamos para que no quede un usuario fantasma en
  // la lista (Supabase igual lo detecta solo tras un rato sin respuesta,
  // pero esto lo hace prácticamente inmediato en un cierre normal).
  window.addEventListener('pagehide', () => {
    if (presenceChannel && me.nick) {
      try { presenceChannel.untrack(); } catch (e) { /* noop */ }
    }
  });

  render();
  rescaleDigichat();
  wireMsgCenter();
  setupGlobalSubscriptions();
  setupPresence();
  loadInitialData();
})();
</script>
</body>
</html>
