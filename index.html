<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegis</title>
<link rel="icon" type="image/svg+xml" href="/brand/aegis-mark.svg">
<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #0b1220;
    color: #e6e9f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
  }
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 {
    margin: 0 0 6px;
    font-size: 28px;
  }
  header p {
    margin: 0;
    color: #9aa3b5;
  }
  .chat-frame {
    width: 100%;
    max-width: 560px;
    height: 500px;
    border: none;
    border-radius: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

</head>
<body>
  <header>
    <h1>Aegis</h1>
    <p>Chatea con la comunidad</p>
  </header>
  <iframe class="chat-frame" src="digichat.html" title="DigiChat" loading="lazy"></iframe>

</html>
